CONFIG_ZMK_USB_LOGGING=n
CONFIG_ZMK_LOGGING_MINIMAL=y
CONFIG_ZMK_LOG_LEVEL_INF=y
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=7000

CONFIG_ZMK_MOUSE=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Debounce settings
# https://zmk.dev/docs/features/debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

CONFIG_ZMK_IDLE_TIMEOUT=300000
# 300000 = 5mins

CONFIG_ZMK_SLEEP=y
# wired build - disable deep sleep for OLED power bug
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
# 1800000 = 30 mins
# 2700000 = 45mins
# 3600000 = 1hr
